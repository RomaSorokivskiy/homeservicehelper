services:
  dashboard:
    build:
      context: ../../dashboard
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      MEALIE_URL: http://mealie:9000
      VIKUNJA_URL: http://vikunja:3456/api/v1
      HOMEBOX_URL: http://homebox:7745/api
      JELLYFIN_URL: http://jellyfin:8096
      HOME_ASSISTANT_URL: http://home-assistant:8123
      HOUSEHOLD_STATE_URL: http://household-state:8787
      MEALIE_TOKEN: ${MEALIE_TOKEN:-}
      MEALIE_SHOPPING_LIST_ID: ${MEALIE_SHOPPING_LIST_ID:-}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN:-}
      VIKUNJA_PROJECT_ID: ${VIKUNJA_PROJECT_ID:-}
      HOMEBOX_TOKEN: ${HOMEBOX_TOKEN:-}
      JELLYFIN_TOKEN: ${JELLYFIN_TOKEN:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET}
      DASHBOARD_USERS: ${DASHBOARD_USERS:-roma}
    networks:
      - edge
    security_opt:
      - no-new-privileges:true

  mealie-db:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: mealie
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: ${MEALIE_POSTGRES_PASSWORD:?set MEALIE_POSTGRES_PASSWORD}
    volumes:
      - mealie_db:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealie -d mealie"]
      interval: 10s
      timeout: 5s
      retries: 10

  mealie:
    image: ${MEALIE_IMAGE}
    restart: unless-stopped
    depends_on:
      mealie-db:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      BASE_URL: https://mealie.${HOME_DOMAIN}
      DB_ENGINE: postgres
      POSTGRES_SERVER: mealie-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: ${MEALIE_POSTGRES_PASSWORD}
      POSTGRES_DB: mealie
      ALLOW_SIGNUP: "false"
    volumes:
      - mealie_data:/app/data
    networks:
      - edge
      - backend
    security_opt:
      - no-new-privileges:true

  vikunja-db:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: vikunja
      POSTGRES_USER: vikunja
      POSTGRES_PASSWORD: ${VIKUNJA_POSTGRES_PASSWORD:?set VIKUNJA_POSTGRES_PASSWORD}
    volumes:
      - vikunja_db:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vikunja -d vikunja"]
      interval: 10s
      timeout: 5s
      retries: 10

  vikunja:
    image: ${VIKUNJA_IMAGE}
    restart: unless-stopped
    depends_on:
      vikunja-db:
        condition: service_healthy
      vikunja-files-init:
        condition: service_completed_successfully
    environment:
      VIKUNJA_SERVICE_PUBLICURL: https://tasks.${HOME_DOMAIN}/
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SECRET:?set VIKUNJA_SECRET}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_POSTGRES_PASSWORD}
    volumes:
      - vikunja_files:/app/vikunja/files
    networks:
      - edge
      - backend
    security_opt:
      - no-new-privileges:true

  vikunja-files-init:
    image: ${POSTGRES_IMAGE}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 1000:0 /app/vikunja/files"]
    volumes:
      - vikunja_files:/app/vikunja/files
    security_opt:
      - no-new-privileges:true

  homebox:
    image: ${HOMEBOX_IMAGE}
    restart: unless-stopped
    environment:
      HBOX_OPTIONS_ALLOW_REGISTRATION: "false"
      HBOX_WEB_MAX_UPLOAD_SIZE: "10"
      HBOX_AUTH_API_KEY_PEPPER: ${HOMEBOX_API_KEY_PEPPER:?set HOMEBOX_API_KEY_PEPPER}
    volumes:
      - homebox_data:/data
    networks:
      - edge
    security_opt:
      - no-new-privileges:true

  vaultwarden:
    image: ${VAULTWARDEN_IMAGE}
    restart: unless-stopped
    environment:
      DOMAIN: https://vault.${HOME_DOMAIN}
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      WEBSOCKET_ENABLED: "true"
    volumes:
      - vaultwarden_data:/data
    networks:
      - edge
    security_opt:
      - no-new-privileges:true

volumes:
  mealie_db:
  mealie_data:
  vikunja_db:
  vikunja_files:
  homebox_data:
  vaultwarden_data:
